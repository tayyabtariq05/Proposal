<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Be Us Friends ❤️</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f8a5c2;
    font-family: Arial, sans-serif;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 {
    margin-bottom: 20px;
}

.buttons {
    position: relative;
    height: 80px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    font-size: 16px;
    cursor: pointer;
    position: absolute;
}

#yes {
    background: #ff4d6d;
    color: white;
    left: 25%;
}

#no {
    background: #ddd;
    left: 60%;
}

.small-text {
    font-size: 12px;
    margin-top: 40px;
    color: gray;
}
</style>
</head>

<body>

<div class="card">
    <h2>🐱💗<br>Will you be my Friend?</h2>

    <div class="buttons">
        <button id="yes" onclick="yesClicked()">Yes 💖</button>
        <button id="no" onmouseover="moveNo()" ontouchstart="moveNo()">No</button>
    </div>

    <div class="small-text">(No is a little shy 😈)</div>
</div>

<script>


function yesClicked() {
    document.body.innerHTML = `
        <div style="
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: #ff4d6d;
            color: white;
            font-family: Arial;
            text-align: center;
        ">
            <h1>YAYYY!! 😍💖</h1>
            <h2>You made me the happiest person ever! 💕</h2>
            <p>Take Screenshot and send it to me. ❤️</p>
        </div>
    `;
}
</script>

</body>
</html>

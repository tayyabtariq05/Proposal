<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be Us Friends ❤️</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #f8a5c2;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 90%;
    max-width: 300px;
}

h2 {
    margin-bottom: 20px;
}

.buttons {
    position: relative;
    height: 80px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    font-size: 16px;
    cursor: pointer;
    position: absolute;
}

#yes {
    background: #ff4d6d;
    color: white;
    left: 20%;
}

#no {
    background: #ddd;
    left: 60%;
}

.small-text {
    font-size: 12px;
    margin-top: 40px;
    color: gray;
}
</style>
</head>

<body>

<div class="card">
    <h2>🐱💗<br>Will you be my Friend?</h2>

    <div class="buttons">
        <button id="yes" onclick="yesClicked()">Yes 💖</button>
        <button id="no" onmouseover="moveNo()" ontouchstart="moveNo()">No</button>
    </div>

    <div class="small-text">(No is a little shy 😈)</div>
</div>

<script>

// YES BUTTON FUNCTION
function yesClicked() {
    document.body.innerHTML = `
        <div style="
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: #ff4d6d;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        ">
            <h1 style="font-size: 28px;">YAYYY!! 😍💖</h1>
            <h2 style="font-size: 20px;">You made me the happiest person ever! 💕</h2>
            <p>Take Screenshot and send it to me ❤️</p>
        </div>
    `;
}

// NO BUTTON RUN AWAY FUNCTION
function moveNo() {
    const noBtn = document.getElementById("no");

    const x = Math.random() * 200 - 100;
    const y = Math.random() * 150 - 75;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;
}

</script>

</body>
</html>
